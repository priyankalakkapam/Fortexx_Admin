name: Fortexx Admin CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Agent job 1
    runs-on: self-hosted
    environment: TST

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: npm install
        run: npm install

      - name: npm build
        run: npm run build

      - name: Archive build output
        run: tar -czf build-artifact.tar.gz app.js package.json

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortexx-admin-artifact
          path: build-artifact.tar.gz
          retention-days: 7

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'your-azure-app-name'
          package: .

      - name: Post Deploy
        run: echo "Deployment complete!"
